name: xau-v2-casestudy
on:
  schedule:
    - cron: '30 14 * * 1'    # Monday 14:30 UTC = 21:30 VN, v2 trend case-study tally
  workflow_dispatch:
jobs:
  v2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 xau_scalp.py --v2
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
