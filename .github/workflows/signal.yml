name: xau-signal
on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 min, forced BUY/SELL (scalp test mode)
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 xau_scalp.py --now
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
